services:
  db:
    image: postgres:latest
    container_name: immigration-cities-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: immigration_cities
      POSTGRES_USER: immigration_cities
      POSTGRES_PASSWORD: immigration_cities
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./sql/ddl.sql:/docker-entrypoint-initdb.d/01-ddl.sql:ro
      - ./sql/currency.sql:/docker-entrypoint-initdb.d/02-currency.sql:ro
      - ./sql/region.sql:/docker-entrypoint-initdb.d/03-region.sql:ro
      - ./sql/country.sql:/docker-entrypoint-initdb.d/04-country.sql:ro
      - ./sql/province.sql:/docker-entrypoint-initdb.d/05-province.sql:ro
      - ./sql/cities.sql:/docker-entrypoint-initdb.d/06-cities.sql:ro
      - ./sql/tax.sql:/docker-entrypoint-initdb.d/07-tax.sql:ro

volumes:
  postgres-data:
